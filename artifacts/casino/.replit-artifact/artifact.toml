kind = "web"
previewPath = "/"
title = "Casino Game"
version = "1.0.0"
id = "artifacts/casino"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22412

[services.development]
run = "pnpm --filter @workspace/casino run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/casino", "run", "build" ]
serve = "static"
publicDir = "artifacts/casino/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22412"
BASE_PATH = "/"
